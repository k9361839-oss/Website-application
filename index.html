<!DOCTYPE html>
<html dir="rtl" lang="he">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>APK to Source | פירוק אפליקציות לקוד</title>
    <style>
        :root {
            --primary: #6366f1;
            --primary-hover: #4f46e5;
            --bg: #f8fafc;
            --card-bg: #ffffff;
            --text: #1e293b;
        }

        body {
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }

        .container {
            background: var(--card-bg);
            padding: 2.5rem;
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.05);
            width: 100%;
            max-width: 450px;
            text-align: center;
            border: 1px solid #e2e8f0;
        }

        .icon-box {
            background: #eef2ff;
            width: 70px;
            height: 70px;
            border-radius: 15px;
            display: flex;
            justify-content: center;
            align-items: center;
            margin: 0 auto 1.5rem;
        }

        h1 {
            font-size: 1.5rem;
            margin-bottom: 0.5rem;
            color: #0f172a;
        }

        p {
            color: #64748b;
            font-size: 0.95rem;
            line-height: 1.5;
            margin-bottom: 2rem;
        }

        .upload-area {
            border: 2px dashed #cbd5e1;
            border-radius: 12px;
            padding: 2rem;
            margin-bottom: 1.5rem;
            cursor: pointer;
            transition: all 0.2s;
        }

        .upload-area:hover {
            border-color: var(--primary);
            background: #f5f7ff;
        }

        input[type="file"] {
            display: none;
        }

        .btn {
            background-color: var(--primary);
            color: white;
            border: none;
            padding: 12px 30px;
            border-radius: 8px;
            font-weight: 600;
            font-size: 1rem;
            cursor: pointer;
            width: 100%;
            transition: background 0.2s;
        }

        .btn:hover {
            background-color: var(--primary-hover);
        }

        .status {
            margin-top: 1rem;
            font-size: 0.85rem;
            color: #94a3b8;
        }

        .features {
            display: flex;
            justify-content: space-around;
            margin-top: 2rem;
            padding-top: 1.5rem;
            border-top: 1px solid #f1f5f9;
        }

        .feature-item {
            font-size: 0.75rem;
            color: #64748b;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="icon-box">
        <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="#6366f1" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"></path><polyline points="7.5 4.21 12 6.81 16.5 4.21"></polyline><polyline points="7.5 19.79 7.5 14.6 3 12"></polyline><polyline points="21 12 16.5 14.6 16.5 19.79"></polyline><polyline points="3.27 6.96 12 12.01 20.73 6.96"></polyline><line x1="12" y1="22.08" x2="12" y2="12"></line></svg>
    </div>
    
    <h1>מפרק APK לקוד מקור</h1>
    <p>העלה קובץ אפליקציה ותוך שניות תקבל קובץ ZIP המכיל את כל קבצי ה-Java וה-XML של הפרויקט.</p>

    <form action="/convert" method="post" enctype="multipart/form-data">
        <label class="upload-area" for="apk_input">
            <svg width="30" height="30" viewBox="0 0 24 24" fill="none" stroke="#94a3b8" stroke-width="2" style="margin-bottom: 10px;"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="17 8 12 3 7 8"></polyline><line x1="12" y1="3" x2="12" y2="15"></line></svg>
            <div id="file-name">לחץ לבחירת קובץ APK</div>
            <input type="file" name="apk_file" id="apk_input" accept=".apk" required onchange="updateFileName()">
        </label>
        
        <button type="submit" class="btn">התחל בפירוק והורדה</button>
    </form>

    <div class="status">מבוסס על מנוע JADX v1.4.7</div>

    <div class="features">
        <div class="feature-item">⚡ מהיר מאוד</div>
        <div class="feature-item">📂 כולל משאבים</div>
        <div class="feature-item">🔒 אנונימי לחלוטין</div>
    </div>
</div>

<script>
    function updateFileName() {
        const input = document.getElementById('apk_input');
        const fileNameDisplay = document.getElementById('file-name');
        if (input.files.length > 0) {
            fileNameDisplay.innerText = "קובץ נבחר: " + input.files[0].name;
            fileNameDisplay.style.color = "#6366f1";
            fileNameDisplay.style.fontWeight = "bold";
        }
    }
</script>

</body>
</html>
